services:
  mongo:
    image: mongo:6
    container_name: my-mongoo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: userdb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  app:
    image: 8076381912/node2:latest
    container_name: my-node-app
    restart: always
    ports:
      - "3000:3000"     # Fixed port, no variable
    environment:
      PORT: 3000
      MONGO_USER: admin
      MONGO_PASSWORD: admin123
      MONGO_DB: userdb
      MONGO_HOST: mongo
      MONGO_PORT: 27017
    depends_on:
      - mongo

volumes:
  mongo-data:
